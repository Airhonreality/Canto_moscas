<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canto de Moscas - AR Experience v2</title>
    
    <!-- A-Frame 1.4.2 (Highly stable with MindAR) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR Image 1.2.5 -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root {
            --primary-bg: #0f0f0f;
            --accent: #ffd700;
            --error: #ff4444;
            --text: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text);
        }

        /* Full Screen Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            text-align: center;
        }

        /* Animated Spinner */
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Start Button - Hidden until Ready */
        #start-btn {
            display: none;
            padding: 16px 48px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #000;
            background: var(--accent);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        #start-btn:active { transform: scale(0.96); }

        /* Status & Log Messaging */
        #status-msg {
            font-size: 1rem;
            opacity: 0.8;
            max-width: 300px;
            line-height: 1.5;
            margin-top: 20px;
        }

        /* Error Banner */
        .error-box {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid var(--error);
            padding: 15px;
            border-radius: 12px;
            color: var(--error);
            display: none;
        }

        /* Scanning Visual Hint */
        #scan-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            display: none;
            animation: pulse-op 1.5s infinite alternate;
        }

        @keyframes pulse-op { from { opacity: 0.5; } to { opacity: 1; } }

        .a-enter-vr { display: none !important; }
    </style>
</head>
<body>

    <!-- UI Layer -->
    <div id="overlay">
        <div id="ui-loader" class="loader"></div>
        <div id="error-box" class="error-box"></div>
        <button id="start-btn">ENTRAR AL CANTO 🪰</button>
        <div id="status-msg">Iniciando motor de Realidad Aumentada...</div>
    </div>

    <div id="scan-hint">Busca la mosca en el libro...</div>

    <!-- AR Scene (A-Frame 1.4.2) -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets_mosca_1.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <audio id="mosca-audio" src="audio_mosca.mp3" preload="auto" loop="true"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- FLY TARGET -->
        <a-entity mindar-image-target="targetIndex: 0" id="fly-target">
            <!-- Visual feedback (Ring) -->
            <a-ring color="#ffd700" radius-inner="0.6" radius-outer="0.8" rotation="-90 0 0" opacity="0.5" 
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 1000; loop: true"></a-ring>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#overlay');
        const statusMsg = document.querySelector('#status-msg');
        const loader = document.querySelector('#ui-loader');
        const errorBox = document.querySelector('#error-box');
        const scanHint = document.querySelector('#scan-hint');
        const audio = document.querySelector('#mosca-audio');

        // Check for local file protocol issue
        if (window.location.protocol === 'file:') {
            loader.style.display = 'none';
            statusMsg.style.display = 'none';
            errorBox.style.display = 'block';
            errorBox.innerHTML = "<strong>Error de Protocolo:</strong> No puedes abrir este archivo directamente. Debe subirse a GitHub Pages o usarse un servidor local (localhost).";
        }

        // Wait for AR Engine to compile targets
        sceneEl.addEventListener('ready', () => {
            console.log("MindAR System Ready");
            loader.style.display = 'none';
            startBtn.style.display = 'block';
            statusMsg.innerText = "Preparado. Toca el botón para activar cámara y sonido.";
        });

        // Activation Flow
        startBtn.addEventListener('click', () => {
            // Hide Overlay
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                scanHint.style.display = 'block';
            }, 600);

            // Start Camera & Engine
            const system = sceneEl.systems['mindar-image-system'];
            system.start();

            // Handle Audio Unlock
            audio.play().then(() => {
                audio.pause(); // Just unlocking, play on targetFound
                audio.currentTime = 0;
            }).catch(e => console.warn("Audio waiting for interaction:", e));
        });

        // Detection Logic
        const flyTarget = document.querySelector('#fly-target');

        flyTarget.addEventListener("targetFound", () => {
            console.log("🪰 Mosca Detectada!");
            scanHint.style.display = 'none';
            audio.play().catch(e => console.error(e));
        });

        flyTarget.addEventListener("targetLost", () => {
            console.log("Mosca Perdida...");
            scanHint.style.display = 'block';
            audio.pause();
        });

        // Error Feedback
        sceneEl.addEventListener("arError", (event) => {
            statusMsg.style.color = "#ff4444";
            statusMsg.innerText = "Error de cámara: " + event.detail.error;
        });

        // Log for checking
        console.log("Versión Robusta v2 Cargada");
    </script>
</body>
</html>
