<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canto de Moscas - Sistema Modular</title>
    
    <!-- Librerías de Visualización AR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- Modulos de Orquestación JS -->
    <script type="module" src="./js/App.js"></script>

    <style>
        :root { --accent: #ffd700; --bg: #000000; }
        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: sans-serif; }

        /* Overlay principal */
        #overlay {
            position: fixed; inset: 0; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            transition: opacity 0.6s ease;
        }

        /* Spinner Animado */
        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.1);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Botón de Entrada */
        #start-btn {
            display: none; padding: 16px 40px; font-size: 1.1rem; font-weight: bold;
            background: var(--accent); border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 40px rgba(255,215,0,0.4); text-transform: uppercase;
        }

        /* Consola de Diagnóstico (Debugger Visual) */
        #debug-logs {
            position: fixed; bottom: 20px; right: 20px;
            width: 250px; max-height: 150px;
            background: rgba(0,0,0,0.7);
            padding: 10px; border-radius: 8px; font-family: monospace;
            font-size: 10px; overflow: hidden; z-index: 10001;
            pointer-events: none; border: 1px solid rgba(255,255,255,0.1);
        }

        #scan-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 12px 24px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2); z-index: 100;
            display: none; pointer-events: none;
        }

        .a-enter-vr { display: none !important; }
    </style>
</head>
<body>

    <!-- Capa del Sistema -->
    <div id="overlay">
        <div id="ui-loader" class="loader"></div>
        <button id="start-btn">INICIAR CANTO DE MOSCA 🪰</button>
        <div id="debug-logs"></div> <!-- Consola Axiomática -->
    </div>

    <!-- Referencia Visual en AR -->
    <div id="scan-hint">Busca la mosca en el dibujo...</div>

    <!-- Escena AR Configurada Determinísticamente -->
    <a-scene 
        id="scene-ar"
        mindar-image="imageTargetSrc: ./targets_mosca_1.mind; autoStart: false; uiLoading: no; uiError: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true; physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <audio id="mosca-audio" src="audio_mosca.mp3" preload="auto" loop="true"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- El Objetivo -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-mosca">
            <a-ring color="#ffd700" radius-inner="0.6" radius-outer="0.8" rotation="-90 0 0"
                    animation="property: scale; to: 1.25 1.25 1.25; dir: alternate; dur: 800; loop: true"></a-ring>
        </a-entity>
    </a-scene>

</body>
</html>
