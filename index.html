<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canto de Moscas - AR Experience</title>
    
    <!-- A-Frame & MindAR Libraries -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root {
            --primary-bg: #121212;
            --accent-color: #ffd700;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
        }

        /* Loading & Overlay Container */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            transition: opacity 0.5s ease;
        }

        /* Startup Button */
        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-bg);
            background-color: var(--accent-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            display: none; /* Hidden until MindAR finishes loading internal assets */
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* Status Text */
        #status {
            margin-top: 20px;
            color: var(--text-color);
            font-size: 1rem;
            text-align: center;
            max-width: 80%;
            opacity: 0.8;
        }

        /* Instruction text during AR */
        #instruction-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            z-index: 100;
            pointer-events: none;
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* AR UI elements suppression */
        .a-enter-vr { display: none !important; }

        /* Spinner for loading */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 215, 0, 0.2);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Overlay UI -->
    <div id="overlay">
        <div id="loading-spinner" class="spinner"></div>
        <button id="start-btn">INICIAR AR</button>
        <div id="status">Cargando el mapa de la mosca...</div>
    </div>

    <div id="instruction-hint">Escanea el dibujo de la mosca 🪰</div>

    <!-- AR Scene -->
    <a-scene 
        mindar-image="imageTargetSrc: ./targets_mosca_1.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <audio id="mosca-sound" src="audio_mosca.mp3" preload="auto" loop="true"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Image Target -->
        <a-entity mindar-image-target="targetIndex: 0" id="mosca-target">
            <!-- Optional: A small aura or visual to confirm tracking -->
            <a-ring color="#ffd700" radius-inner="0.8" radius-outer="1" opacity="0.3" rotation="-90 0 0" 
                    animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 800; loop: true"></a-ring>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#overlay');
        const statusText = document.querySelector('#status');
        const spinner = document.querySelector('#loading-spinner');
        const instructionHint = document.querySelector('#instruction-hint');
        const audio = document.querySelector('#mosca-sound');

        // 1. Wait for MindAR to be ready
        sceneEl.addEventListener('ready', () => {
            console.log("MindAR Ready");
            spinner.style.display = 'none';
            startBtn.style.display = 'block';
            statusText.innerText = "Listo. Haz clic para activar el sonido y la cámara.";
        });

        // 2. Handle Start click (Resume AudioContext & Start AR)
        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                instructionHint.style.display = 'block';
            }, 500);

            // Start AR engine
            const { systems } = sceneEl;
            systems['mindar-image-system'].start();

            // Resume audio context for browsers
            const audioCtx = AFRAME.ANALYTICS ? AFRAME.ANALYTICS.audioContext : null;
            if (audioCtx) {
                audioCtx.resume();
            }
            
            // Interaction to unlock audio
            audio.play();
            audio.pause();
            audio.currentTime = 0;
        });

        // 3. Tracking Events
        const targetEl = document.querySelector('#mosca-target');

        targetEl.addEventListener("targetFound", event => {
            console.log("Target Found! 🪰");
            instructionHint.style.display = 'none';
            audio.play().catch(e => console.error("Audio error:", e));
        });

        targetEl.addEventListener("targetLost", event => {
            console.log("Target Lost");
            instructionHint.style.display = 'block';
            audio.pause();
        });

        // Error Handling
        sceneEl.addEventListener("arError", (event) => {
            console.error("AR Error:", event.detail.error);
            statusText.innerText = "Error de cámara: " + event.detail.error;
            statusText.style.color = "#ff4444";
            spinner.style.display = 'none';
        });
    </script>
</body>
</html>
